<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Teal rounded background -->
  <rect width="32" height="32" rx="7" fill="oklch(0.48 0.18 195)"/>

  <!-- Pig body -->
  <ellipse cx="17" cy="18" rx="8.5" ry="7"
           fill="white" fill-opacity="0.12"
           stroke="white" stroke-width="1.5"/>

  <!-- Snout -->
  <ellipse cx="9" cy="20" rx="3" ry="2.2"
           fill="white" fill-opacity="0.12"
           stroke="white" stroke-width="1.3"/>

  <!-- Coin slot -->
  <rect x="14" y="10" width="5" height="1.5" rx="0.75" fill="white" opacity="0.9"/>

  <!-- Eye -->
  <circle cx="19" cy="15.5" r="1.1" fill="white" opacity="0.95"/>

  <!-- Nostrils -->
  <circle cx="8.5" cy="20" r="0.6" fill="white" opacity="0.75"/>
  <circle cx="10.2" cy="20" r="0.6" fill="white" opacity="0.75"/>

  <!-- Tail -->
  <path d="M25.5 17 Q28.5 15.5 27.5 19.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.75"/>
</svg>
